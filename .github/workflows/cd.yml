name: CD - Construcción del proyecto JS

on:
  push:
    branches: [ "feature/pipelines" ]

jobs:
  construccion:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install

      - name: Construir el proyecto
        run: npm run build --if-present

      - name: Verificar información del entorno
        run: |
          echo "¡Construcción completada exitosamente!"
          echo "Rama: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Fecha de ejecución: $(date)"

      - name: Guardar artefacto generado
        uses: actions/upload-artifact@v4
        with:
          name: artefacto-construccion
          path: .
