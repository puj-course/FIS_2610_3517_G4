name: HU-454 - Pipeline CI/CD Autenticacion

on:
  # CI para revisar cambios en PR antes de merge
  pull_request:
    branches: [develop, main]
    paths:
      - 'apps/web/**'
      - 'backend/**'
      - '.github/workflows/pipeline_hu454_auth_ci_cd.yml'

  # CD al hacer push directo/merge en ramas objetivo
  push:
    branches: [develop, main]
    paths:
      - 'apps/web/**'
      - 'backend/**'
      - '.github/workflows/pipeline_hu454_auth_ci_cd.yml'

  # Permite ejecutar pruebas manuales desde Actions
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend_ci:
    name: Frontend CI (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias frontend
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend_ci:
    name: Backend CI (instalacion + validacion)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias backend
        run: npm ci

      # Validacion rapida de sintaxis para evitar romper despliegue.
      - name: Verificar sintaxis backend
        run: node --check server.js

  deploy_backend:
    name: CD Backend (hook externo)
    runs-on: ubuntu-latest
    needs: [frontend_ci, backend_ci]
    if: github.event_name == 'push'

    steps:
      - name: Disparar deploy de backend por webhook
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        run: |
          # Si no existe el secreto, no falla el pipeline; deja traza clara.
          if [ -z "$BACKEND_DEPLOY_HOOK_URL" ]; then
            echo "BACKEND_DEPLOY_HOOK_URL no configurado. Se omite deploy backend."
            exit 0
          fi

          curl -fsS -X POST "$BACKEND_DEPLOY_HOOK_URL"
          echo "Deploy de backend solicitado correctamente."

  deploy_frontend:
    name: CD Frontend (hook externo)
    runs-on: ubuntu-latest
    needs: [frontend_ci, backend_ci]
    if: github.event_name == 'push'

    steps:
      - name: Disparar deploy de frontend por webhook
        env:
          FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          # Si no existe el secreto, no falla el pipeline; deja traza clara.
          if [ -z "$FRONTEND_DEPLOY_HOOK_URL" ]; then
            echo "FRONTEND_DEPLOY_HOOK_URL no configurado. Se omite deploy frontend."
            exit 0
          fi

          curl -fsS -X POST "$FRONTEND_DEPLOY_HOOK_URL"
          echo "Deploy de frontend solicitado correctamente."
