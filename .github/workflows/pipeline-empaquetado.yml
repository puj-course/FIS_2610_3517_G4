name: Pipeline 1 - Empaquetado del frontend

on:
  push:
    branches:
      - feature/pipeline
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  empaquetar-web:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Construir aplicacion
        run: npm run build

      - name: Verificar artefacto generado
        run: |
          test -f ../../dist/apps/web/index.html
          ls -R ../../dist/apps/web

      - name: Subir artefacto del frontend
        uses: actions/upload-artifact@v4
        with:
          name: drivecontrol-web-build
          path: dist/apps/web
          if-no-files-found: error
          retention-days: 7
