name: "Kanban 1 - Flujo y Asignación Dinámica"
on:
  issues:
    # Apenas nace una issue, se automatiza la logística mínima del tablero.
    types: [opened]

jobs:
  auto-organizar:
    name: Asignación al Autor y Logística
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Asignar al creador del Issue
        uses: actions/github-script@v6
        with:
          script: |
            // La autoasignación deja claro quién abrió la tarea y evita issues huérfanas.
            github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [context.payload.issue.user.login]
            })

      - name: Comentar confirmación de flujo
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            <!-- Mensaje ligero para confirmar que la automatización de flujo sí corrió -->
            ###  Organización Hecha
            Hola @${{ github.actor }}, se ha generado una asignación automática para esta tarea.
            
            
