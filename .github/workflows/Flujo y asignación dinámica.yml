name: "Kanban 1 - Flujo y Asignación Dinámica"
on:
  issues:
    types: [opened]

jobs:
  auto-organizar:
    name: Asignación al Autor y Logística
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Asignar al creador del Issue
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/assignees \
          -d '{"assignees":["${{ github.actor }}"]}'

      - name: Comentar confirmación de flujo
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Se ha generado una asignación automática-
