name: Issue assignment

on:
  issues:
    types: [opened]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 'Auto-assign issue'
        uses: pozil/auto-assign-issue@v2
        with:
          assignees: tu-usuario-aqui # CAMBIA ESTO por tu nombre de usuario real
          repo-token: ${{ secrets.GITHUB_TOKEN }}
