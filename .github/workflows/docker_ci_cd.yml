name: Docker CI/CD

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "apps/web/Dockerfile"
      - "apps/web/nginx.conf"
      - "apps/web/**"
      - "backend/**"
      - ".github/workflows/docker_ci_cd.yml"
  push:
    # También valida pushes en ramas feature para detectar problemas antes del PR.
    branches: [feature-*, feature/**, develop, main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "apps/web/Dockerfile"
      - "apps/web/nginx.conf"
      - "apps/web/**"
      - "backend/**"
      - ".github/workflows/docker_ci_cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-validate:
    name: Build, pruebas y validacion Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            backend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: apps/web
        run: npm ci

      - name: Lint frontend
        working-directory: apps/web
        run: npm run lint

      - name: Auditar dependencias frontend
        working-directory: apps/web
        run: npm audit --audit-level=moderate

      - name: Pruebas frontend con coverage
        working-directory: apps/web
        run: npm test

      - name: Evidencia de metricas propias
        working-directory: apps/web
        run: npm run quality:metrics

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

      - name: Instalar dependencias backend
        working-directory: backend
        run: npm ci

      - name: Auditar dependencias backend
        working-directory: backend
        run: npm audit --audit-level=moderate

      - name: Pruebas backend
        working-directory: backend
        run: npm test

      - name: Validar sintaxis backend
        working-directory: backend
        run: node --check server.js

      - name: Preflight de autenticacion backend
        working-directory: backend
        run: npm run doctor:auth:ci

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validar sintaxis docker-compose
        run: docker compose -f docker-compose.yml config

      - name: Validar compose de despliegue con imagenes publicadas
        env:
          BACKEND_IMAGE: docker.io/example/drivectrl-backend
          FRONTEND_IMAGE: docker.io/example/drivectrl-frontend
          IMAGE_TAG: ci
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Construir imagen backend
        run: docker build -t local/drivectrl-backend:ci -f Dockerfile .

      - name: Construir imagen frontend
        run: >
          docker build
          --build-arg VITE_API_URL=/api
          --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}"
          -t local/drivectrl-frontend:ci
          -f apps/web/Dockerfile
          .

      - name: Levantar stack Docker Compose
        run: docker compose up -d --build

      - name: Validar health backend
        run: curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://localhost:5000/api/health/db

      - name: Validar frontend
        run: curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://localhost:3000/

      - name: Validar proxy API del frontend
        run: curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://localhost:3000/api/health/db

      - name: Mostrar servicios activos
        run: docker compose ps

      - name: Limpiar stack Docker Compose
        if: always()
        run: docker compose down -v

  docker-publish:
    name: Publicacion versionada en DockerHub
    runs-on: ubuntu-latest
    needs: docker-validate
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Exigir secretos DockerHub
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Faltan DOCKERHUB_USERNAME o DOCKERHUB_TOKEN. La rubrica exige publicacion real, por eso este job falla."
            exit 1
          fi

      - name: Definir tags versionados
        id: tags
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${SAFE_REF}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "branch_latest=${SAFE_REF}-latest" >> "$GITHUB_OUTPUT"

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publicar backend en DockerHub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-backend:${{ steps.tags.outputs.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-backend:${{ steps.tags.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-backend:${{ steps.tags.outputs.branch_latest }}

      - name: Publicar frontend en DockerHub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-frontend:${{ steps.tags.outputs.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-frontend:${{ steps.tags.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-frontend:${{ steps.tags.outputs.branch_latest }}

      - name: Resumen de imagenes publicadas
        run: |
          echo "Backend:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-backend:${{ steps.tags.outputs.sha }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-backend:${{ steps.tags.outputs.version }}"
          echo "Frontend:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-frontend:${{ steps.tags.outputs.sha }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-frontend:${{ steps.tags.outputs.version }}"

  docker-deploy:
    name: Despliegue Docker Compose desde DockerHub
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preparar entorno de despliegue versionado
        run: |
          echo "BACKEND_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-frontend" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "VITE_API_URL=/api" >> "$GITHUB_ENV"

      - name: Validar configuracion Compose de despliegue
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Descargar imagenes publicadas
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend

      - name: Desplegar stack con imagenes versionadas
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

      - name: Validar health backend desplegado
        run: curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://localhost:5000/api/health/db

      - name: Validar frontend desplegado
        run: curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://localhost:3000/

      - name: Validar proxy API desplegado
        run: curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://localhost:3000/api/health/db

      - name: Evidencia de servicios desplegados
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

      - name: Limpiar despliegue
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down -v
