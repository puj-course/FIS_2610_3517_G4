name: Docker CI/CD

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "apps/web/Dockerfile"
      - "apps/web/nginx.conf"
      - "apps/web/**"
      - "backend/**"
      - ".github/workflows/docker_ci_cd.yml"
  push:
    branches: [develop, main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "apps/web/Dockerfile"
      - "apps/web/nginx.conf"
      - "apps/web/**"
      - "backend/**"
      - ".github/workflows/docker_ci_cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-validate:
    name: Build y validacion Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validar sintaxis docker-compose
        run: docker compose -f docker-compose.yml config

      - name: Construir imagen backend
        run: docker build -t local/drivectrl-backend:ci -f Dockerfile .

      - name: Construir imagen frontend
        run: >
          docker build
          --build-arg VITE_API_URL=/api
          --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}"
          -t local/drivectrl-frontend:ci
          -f apps/web/Dockerfile
          .

      - name: Levantar stack Docker Compose
        run: docker compose up -d --build

      - name: Validar health backend
        run: curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://localhost:5000/api/health/db

      - name: Validar frontend
        run: curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://localhost:3000/

      - name: Validar proxy API del frontend
        run: curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://localhost:3000/api/health/db

      - name: Mostrar servicios activos
        run: docker compose ps

      - name: Limpiar stack Docker Compose
        if: always()
        run: docker compose down -v

  docker-publish:
    name: Publicacion en DockerHub
    runs-on: ubuntu-latest
    needs: docker-validate
    if: github.event_name == 'push'
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verificar secretos DockerHub
        id: secrets_check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No existen secretos DOCKERHUB_USERNAME/DOCKERHUB_TOKEN. Se omite push."
          fi

      - name: Login DockerHub
        if: steps.secrets_check.outputs.ready == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publicar backend en DockerHub
        if: steps.secrets_check.outputs.ready == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-backend:latest

      - name: Publicar frontend en DockerHub
        if: steps.secrets_check.outputs.ready == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/drivectrl-frontend:latest
