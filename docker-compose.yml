services:
  mongodb:
    image: mongo:7
    container_name: drivectrl-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - drivectrl-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drivectrl-backend
    restart: unless-stopped
    env_file:
      - apps/web/.env
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-local-compose-jwt-secret}
      MONGO_URI: ${DOCKER_MONGO_URI:-${MONGO_URI:-mongodb://mongodb:27017/logistica_db}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-${VITE_GOOGLE_CLIENT_ID:-}}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_MOCK_ENABLED: ${SMS_MOCK_ENABLED:-}
      OTP_EXPIRACION_MINUTOS: ${OTP_EXPIRACION_MINUTOS:-10}
      OTP_MAX_INTENTOS: ${OTP_MAX_INTENTOS:-5}
      OTP_COOLDOWN_SEGUNDOS: ${OTP_COOLDOWN_SEGUNDOS:-60}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/api/health/db').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - drivectrl-net

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID:-}}
    container_name: drivectrl-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - drivectrl-net

volumes:
  mongo_data:

networks:
  drivectrl-net:
    name: drivecontrol-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
